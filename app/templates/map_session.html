{% extends "base.html" %}

{% block head %}
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
    #map { width: 100%; height: 70vh; background-color: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; z-index: 1; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 2rem; border-radius: 12px; width: 450px; max-width: 90%; max-height: 90vh; overflow-y: auto; }
    .map-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    
    /* Carousel styles for multiple flags */
    .flag-carousel-item { display: none; }
    .flag-carousel-item.active { display: block; }
    .carousel-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
    .carousel-controls button { padding: 5px 10px; cursor: pointer; border: none; background: #e2e8f0; border-radius: 4px; }
    .carousel-controls button:hover { background: #cbd5e1; }

    .leaflet-popup-content::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Tooltip & Speech Bubble */
    .leaflet-tooltip.custom-tooltip {
        width: 380px;
        white-space: normal;
        word-break: break-word;
        padding: 0;
        background: #fff;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        box-shadow: 0 12px 24px -6px rgba(0, 0, 0, 0.15);
        box-sizing: border-box;
        margin-top: -5px !important;
        font-family: inherit;
    }
    .tooltip-container { padding: 15px; display: flex; flex-direction: column; }
    .tooltip-author-name { font-size: 1rem; color: #1e293b; margin-bottom: 6px; display: block; font-weight: 700; }
    .tooltip-content-preview { font-size: 0.95rem; line-height: 1.6; color: #334155; margin-top: 6px; display: block; }
    .tooltip-media, .carousel-media { margin-top: 10px; border-radius: 10px; overflow: hidden; border: 1px solid #e2e8f0; }
    .carousel-media img, .carousel-media video { width: 100%; height: auto; display: block; }
    .tooltip-media img, .tooltip-media video { width: 100%; max-height: 180px; object-fit: cover; display: block; }

    /* Custom Marker */
    .custom-div-icon { background: none; border: none; }
    .marker-pin {
        width: 30px; height: 30px; border-radius: 50% 50% 50% 0;
        background: #3b82f6; position: absolute; transform: rotate(-45deg);
        left: 50%; top: 50%; margin: -15px 0 0 -15px;
        border: 2px solid #fff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }
    .marker-pin::after {
        content: ''; width: 12px; height: 12px; margin: 7px 0 0 7px;
        background: #fff; position: absolute; border-radius: 50%;
    }
    .active-tooltip { z-index: 9999 !important; border-color: #3b82f6 !important; }

    /* Tooltip styling - Tail removed */
    .leaflet-tooltip {
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 4px 10px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        font-family: inherit;
        font-weight: 600;
        color: #1e293b;
        font-size: 0.8rem;
    }
    /* Arrow removed as requested */
    .tooltip-media {
        margin-top: 10px;
        border-radius: 10px;
        overflow: hidden;
        max-width: 100%; /* Use full width of tooltip */
    }
    .tooltip-media img, .tooltip-media video {
        width: 100%;
        max-height: 180px;
        object-fit: cover;
        display: block;
    }
    /* Larger permanent tooltip for better readability */
    .leaflet-tooltip.custom-tooltip {
        width: 380px;
        white-space: normal;
        word-break: break-word;
        padding: 0;
        background: rgba(255, 255, 255, 1);
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        box-shadow: 0 12px 24px -6px rgba(0, 0, 0, 0.15);
        box-sizing: border-box;
        margin-top: -5px !important; /* Adjust relative to marker top */
    }
    
    /* Custom Marker Styling */
    .custom-div-icon {
        background: none;
        border: none;
    }
    .marker-pin {
        width: 30px;
        height: 30px;
        border-radius: 50% 50% 50% 0;
        background: #3b82f6;
        position: absolute;
        transform: rotate(-45deg);
        left: 50%;
        top: 50%;
        margin: -15px 0 0 -15px;
        border: 2px solid #ffffff;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }
    .marker-pin::after {
        content: '';
        width: 12px;
        height: 12px;
        margin: 7px 0 0 7px;
        background: #ffffff;
        position: absolute;
        border-radius: 50%;
    }
    .tooltip-container {
        padding: 15px; /* Apply padding here instead */
        display: flex;
        flex-direction: column;
    }
    .tooltip-author-name {
        font-size: 1rem;
        color: #1e293b;
        margin-bottom: 6px;
        display: block;
    }
    .tooltip-content-preview {
        font-size: 0.95rem;
        line-height: 1.6;
        color: #334155;
        margin-top: 6px;
        display: block;
        font-style: normal;
        transition: all 0.2s ease;
    }
    .leaflet-tooltip.custom-tooltip:hover,
    .leaflet-tooltip.active-tooltip {
        z-index: 9999 !important;
        border-color: #3b82f6;
        box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2), 0 8px 10px -6px rgba(0, 0, 0, 0.2);
        background: rgba(255, 255, 255, 1);
    }

    /* Replay Panel Styles */
    .replay-panel {
        width: 100%;
        margin-top: 15px;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
        padding: 12px 20px;
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        flex-wrap: wrap;
        transition: all 0.3s ease;
    }
    .replay-btn-group {
        display: flex;
        gap: 8px;
        align-items: center;
    }
    .replay-round-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        background: #f1f5f9;
        color: #334155;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        transition: all 0.2s;
    }
    .replay-round-btn:hover {
        background: #e2e8f0;
        color: #0f172a;
    }
    .replay-round-btn.btn-play {
        width: 44px;
        height: 44px;
        background: #3b82f6;
        color: white;
        font-size: 1.2rem;
    }
    .replay-round-btn.btn-play:hover {
        background: #2563eb;
    }
    
    /* Active Marker Animation */
    .marker-pin.replay-active {
        background: #e11d48 !important; /* Rose-600 */
        transform: rotate(-45deg) scale(1.2);
        box-shadow: 0 0 15px #e11d48;
        animation: pulse-ring-replay 1.5s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
    }
    @keyframes pulse-ring-replay {
        0% { transform: rotate(-45deg) scale(1.1); box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); }
        70% { transform: rotate(-45deg) scale(1.25); box-shadow: 0 0 0 12px rgba(225, 29, 72, 0); }
        100% { transform: rotate(-45deg) scale(1.1); box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
    }
    
    .status-dot-pulse {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #e11d48;
        border-radius: 50%;
        margin-right: 6px;
        box-shadow: 0 0 0 rgba(225, 29, 72, 0.4);
        animation: pulse-dot 1.5s infinite;
    }
    @keyframes pulse-dot {
        0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); }
        70% { box-shadow: 0 0 0 6px rgba(225, 29, 72, 0); }
        100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
    }
</style>
{% endblock %}

{% block content %}
<div class="map-header">
    <h2>Session: {{ map_session.name }}</h2>
    <div class="controls" style="display: flex; gap: 10px; align-items: center;">
        {% if is_admin %}
        <button id="startReplayBtn" class="btn btn-primary" onclick="startReplay()" style="background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); border: none; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);">
            <span>▶</span> PLAY
        </button>
        {% endif %}
        <input type="text" id="nickname" class="form-control" placeholder="Your Name (Optional)" value="{{ 'Admin' if is_admin else '' }}" {{ 'disabled' if is_admin else '' }}>
    </div>
</div>

<div id="map"></div>

{% if is_admin %}
<!-- Replay Control Panel -->
<div id="replayPanel" class="replay-panel">
    <!-- Left: Navigation and Speed controls -->
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="replay-btn-group">
            <button type="button" class="replay-round-btn" onclick="prevReplay()" title="이전" style="padding: 0; display: flex; align-items: center; justify-content: center;">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button type="button" id="replayPlayPauseBtn" class="replay-round-btn btn-play" onclick="toggleReplayPlay()" title="재생" style="padding: 0; display: flex; align-items: center; justify-content: center;">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button type="button" class="replay-round-btn" onclick="nextReplay()" title="다음" style="padding: 0; display: flex; align-items: center; justify-content: center;">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg>
            </button>
        </div>
        
        <div>
            <select id="replaySpeed" onchange="changeReplaySpeed(this.value)" style="padding: 6px 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 0.85rem; font-weight: 600; color: #334155; background: white; cursor: pointer; outline: none;">
                <option value="5000">5초</option>
                <option value="3000" selected>3초</option>
                <option value="2000">2초</option>
                <option value="1000">1초</option>
            </select>
        </div>
    </div>
    
    <!-- Middle: Progress bar and count -->
    <div style="flex-grow: 1; display: flex; align-items: center; gap: 12px; min-width: 200px;">
        <input type="range" id="replaySlider" min="0" max="0" value="0" oninput="seekReplay(this.value)" style="width: 100%; height: 6px; border-radius: 3px; background: #cbd5e1; outline: none; -webkit-appearance: none; cursor: pointer; accent-color: #3b82f6;">
        <span id="replayProgressText" style="font-size: 0.85rem; font-weight: 700; color: #64748b; white-space: nowrap; min-width: 45px; text-align: right;">0 / 0</span>
    </div>
    
    <!-- Right: Current note time and stop replay button -->
    <div style="display: flex; align-items: center; gap: 20px;">
        <div id="replayTimeDisplay" style="font-size: 0.85rem; font-weight: 600; color: #64748b; white-space: nowrap; display: flex; align-items: center;">
            <span class="status-dot-pulse"></span>
            <span id="replayTimeText">-</span>
        </div>
        <button type="button" class="btn btn-secondary btn-sm" onclick="stopReplay()" style="display: flex; align-items: center; gap: 4px; padding: 6px 12px; font-weight: 600; border-radius: 8px; background: #fee2e2; color: #ef4444; border: 1px solid #fecaca;" onmouseover="this.style.background='#fecaca'" onmouseout="this.style.background='#fee2e2'">
            ✕ 종료
        </button>
    </div>
</div>
{% endif %}

<!-- Add/Edit Flag Modal -->
<div id="flagModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add Note</h3>
        <p class="text-muted" style="font-size: 0.8rem;">Location: <span id="displayCoords"></span></p>
        <form id="flagForm">
            <input type="hidden" id="coordLat">
            <input type="hidden" id="coordLng">
            <input type="hidden" id="editFlagId">
            <div class="form-group">
                <label>Text</label>
                <textarea id="textContent" class="form-control" rows="3" placeholder="Write something or paste a YouTube link..."></textarea>
            </div>
            <div class="form-group">
                <label>Attach File (Optional, replaces existing if editing)</label>
                <input type="file" id="fileInput" class="form-control" accept="image/png,image/jpeg,image/gif,image/webp,video/mp4,video/webm,video/quicktime">
            </div>
            
            <!-- Live Preview Container -->
            <div id="mediaPreviewContainer" style="display: none; margin-bottom: 15px; border: 1px dashed #cbd5e1; padding: 10px; border-radius: 8px; text-align: center;">
                <p style="font-size: 0.8rem; color: #64748b; margin-top: 0; margin-bottom: 8px;">Preview</p>
                <div id="mediaPreviewContent"></div>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary" id="submitFlagBtn">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Info Modal for viewing flags -->
<div id="infoModal" class="modal">
    <div class="modal-content">
        <h3>Location Notes</h3>
        <div id="carouselContainer">
            <!-- Flags will be injected here -->
        </div>
        <div class="carousel-controls" id="carouselControls" style="display: none;">
            <button type="button" onclick="prevFlag()">Previous</button>
            <span id="carouselIndicator">1 / 1</span>
            <button type="button" onclick="nextFlag()">Next</button>
        </div>
        <div style="margin-top: 15px; text-align: right;">
            <button type="button" class="btn btn-secondary" onclick="closeInfoModal()">Close</button>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.1/socket.io.js"></script>
<script>
    const sessionId = "{{ map_session.id }}";
    const socket = io();
    let map;
    
    // Authorization: Client ID
    let clientId = localStorage.getItem('classroom_client_id');
    if (!clientId) {
        clientId = 'client_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('classroom_client_id', clientId);
    }
    const isAdmin = "{{ is_admin }}" === "True";
    const classSessions = {{ class_sessions|tojson|safe if class_sessions else '[]' }};
    
    // Helper to prevent XSS and handle links/newlines
    function escapeHTML(str) {
        if (!str) return '';
        return str.toString()
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function linkify(text) {
        const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
        return text.replace(urlPattern, function(url) {
            return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="link-preview-box">🔗 ${url}</a>`;
        });
    }

    function formatFlagContent(text) {
        if (!text) return '';
        let escaped = escapeHTML(text);
        // We linkify the escaped text, but need to be careful with the <a> tag
        // Since we want to support YouTube embed separately, we'll keep it simple
        return linkify(escaped);
    }
    
    // We group flags by coordinate grouping.
    const flagGroups = {};
    let markers = {};
    let currentCarouselFlags = [];
    let currentCarouselIndex = 0;

    // Replay state
    let allFlags = [];
    let isReplaying = false;
    let isPlaying = false;
    let replayIndex = 0;
    let replayTimer = null;
    let activeReplayKey = null;

    function sortFlagsChronologically() {
        allFlags.sort((a, b) => {
            if (a.created_at && b.created_at) {
                return new Date(a.created_at) - new Date(b.created_at);
            }
            return a.id - b.id;
        });
    }

    // Custom Symmetric Marker Icon
    const customIcon = L.divIcon({
        className: 'custom-div-icon',
        html: `<div class="marker-pin"></div>`,
        iconSize: [30, 42],
        iconAnchor: [15, 42]
    });

    // Media Preview Logic
    function getYouTubeId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function updatePreview() {
        const previewContainer = document.getElementById('mediaPreviewContainer');
        const previewContent = document.getElementById('mediaPreviewContent');
        const textVal = document.getElementById('textContent').value;
        const fileInput = document.getElementById('fileInput');

        previewContent.innerHTML = '';
        previewContainer.style.display = 'none';

        // 1. File preview takes precedence
        if (fileInput.files && fileInput.files[0]) {
            const file = fileInput.files[0];
            const fileUrl = URL.createObjectURL(file);
            
            if (file.type.startsWith('image/')) {
                previewContent.innerHTML = `<img src="${fileUrl}" style="max-width: 100%; max-height: 200px; border-radius: 4px;">`;
                previewContainer.style.display = 'block';
                return;
            } else if (file.type.startsWith('video/')) {
                previewContent.innerHTML = `<video controls src="${fileUrl}" style="max-width: 100%; max-height: 200px; border-radius: 4px; background: #000;"></video>`;
                previewContainer.style.display = 'block';
                return;
            }
        }

        // 2. YouTube preview
        if (textVal) {
            const words = textVal.split(/\s+/);
            for (let word of words) {
                const ytId = getYouTubeId(word);
                if (ytId) {
                    previewContent.innerHTML = `
                    <div style="position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 4px; overflow: hidden; margin-top: 10px;">
                        <iframe src="https://www.youtube.com/embed/${ytId}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" allowfullscreen></iframe>
                    </div>`;
                    previewContainer.style.display = 'block';
                    return;
                }
            }
        }
    }

    document.getElementById('textContent').addEventListener('input', updatePreview);
    document.getElementById('fileInput').addEventListener('change', updatePreview);

    document.addEventListener('DOMContentLoaded', () => {
        // Initialize Leaflet Map
        map = L.map('map').setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Attempt to center map by IP roughly
        fetch('http://ip-api.com/json/')
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    map.setView([data.lat, data.lon], 12);
                }
            })
            .catch(err => console.log("IP geolocation failed", err));

        // Add 'My Location' Control
        const locateControl = L.control({position: 'topright'});
        locateControl.onAdd = function (map) {
            const btn = L.DomUtil.create('button', 'btn btn-secondary');
            btn.innerHTML = '📍 My Location';
            btn.style.margin = '10px';
            btn.style.background = 'white';
            btn.style.border = '2px solid rgba(0,0,0,0.2)';
            btn.style.borderRadius = '4px';
            btn.style.padding = '5px 10px';
            btn.style.cursor = 'pointer';
            btn.style.fontWeight = 'bold';
            
            btn.onmouseover = () => btn.style.background = '#f4f4f4';
            btn.onmouseout = () => btn.style.background = 'white';

            L.DomEvent.disableClickPropagation(btn);
            
            btn.onclick = function(e) {
                e.preventDefault();
                map.locate({setView: true, maxZoom: 16});
            };
            return btn;
        };
        locateControl.addTo(map);

        map.on('locationerror', function(e) {
            alert("Could not access your location. Please ensure location permissions are granted.");
        });

        // Map Click Event -> Open Add Note modal
        map.on('click', function(e) {
            if (isReplaying) return;
            openModal(e.latlng.lat, e.latlng.lng);
        });

        // Join Socket.io room
        socket.emit('join', {session_id: sessionId});

        socket.on('load_flags', function(flags) {
            allFlags = flags.filter(f => f.x !== null && f.y !== null);
            sortFlagsChronologically();
            flags.forEach(f => {
                if(f.x !== null && f.y !== null) {
                    addFlagToMap(f);
                }
            });
            
            // Check for autoplay on load
            if (isAdmin && sessionStorage.getItem('autoplay_active') === 'true') {
                if (allFlags.length === 0) {
                    const currentIdx = classSessions.findIndex(s => s.id === sessionId);
                    if (currentIdx !== -1 && classSessions.length > 1) {
                        const nextSession = classSessions[(currentIdx + 1) % classSessions.length];
                        let visited = JSON.parse(sessionStorage.getItem('autoplay_visited') || '[]');
                        if (visited.includes(nextSession.id)) {
                            sessionStorage.removeItem('autoplay_active');
                            sessionStorage.removeItem('autoplay_visited');
                            sessionStorage.removeItem('autoplay_speed');
                        } else {
                            visited.push(sessionId);
                            sessionStorage.setItem('autoplay_visited', JSON.stringify(visited));
                            window.location.href = `/session/${nextSession.id}`;
                        }
                    }
                } else {
                    startReplay();
                    const savedSpeed = sessionStorage.getItem('autoplay_speed');
                    if (savedSpeed) {
                        const speedSelect = document.getElementById('replaySpeed');
                        if (speedSelect) {
                            speedSelect.value = savedSpeed;
                            changeReplaySpeed(savedSpeed);
                        }
                    }
                }
            }
        });

        socket.on('new_flag', function(flag) {
            if(flag.x !== null && flag.y !== null) {
                addFlagToMap(flag);
                if (!allFlags.find(f => f.id === flag.id)) {
                    allFlags.push(flag);
                    sortFlagsChronologically();
                    if (isReplaying) {
                        updateReplayProgress();
                    }
                }
            }
        });
        
        socket.on('flag_edited', function(updatedFlag) {
            const key = getGroupKey(parseFloat(updatedFlag.x), parseFloat(updatedFlag.y));
            if (flagGroups[key]) {
                const idx = flagGroups[key].findIndex(f => f.id === updatedFlag.id);
                if (idx !== -1) {
                    flagGroups[key][idx] = updatedFlag;
                    // Update popup if open
                    updateMarkerPopup(key);
                    
                    if (document.getElementById('infoModal').style.display === 'flex' && currentCarouselFlags === flagGroups[key]) {
                        renderCarousel();
                    }
                }
            }
            
            // Update in allFlags
            const allIdx = allFlags.findIndex(f => f.id === updatedFlag.id);
            if (allIdx !== -1) {
                allFlags[allIdx] = updatedFlag;
                if (isReplaying && replayIndex === allIdx) {
                    showReplayStep();
                }
            }
        });
        
        socket.on('flag_deleted', function(data) {
            const flagId = data.id;
            for (const key in flagGroups) {
                const idx = flagGroups[key].findIndex(f => f.id === flagId);
                if (idx !== -1) {
                    flagGroups[key].splice(idx, 1);
                    // Remove marker if no flags left
                    if (flagGroups[key].length === 0) {
                        map.removeLayer(markers[key]);
                        delete markers[key];
                        
                        if (document.getElementById('infoModal').style.display === 'flex' && currentCarouselFlags === flagGroups[key]) {
                            closeInfoModal();
                        }
                        
                        delete flagGroups[key];
                    } else {
                        updateMarkerPopup(key);
                        if (document.getElementById('infoModal').style.display === 'flex' && currentCarouselFlags === flagGroups[key]) {
                            if (currentCarouselIndex >= flagGroups[key].length) {
                                currentCarouselIndex = flagGroups[key].length - 1;
                            }
                            renderCarousel();
                        }
                    }
                    break;
                }
            }
            
            // Update in allFlags
            const allIdx = allFlags.findIndex(f => f.id === flagId);
            if (allIdx !== -1) {
                allFlags.splice(allIdx, 1);
                if (isReplaying) {
                    if (allFlags.length === 0) {
                        stopReplay();
                    } else {
                        if (replayIndex >= allFlags.length) {
                            replayIndex = allFlags.length - 1;
                        }
                        updateReplayProgress();
                        showReplayStep();
                    }
                }
            }
        });
    });

    function getGroupKey(lat, lng) {
        return `${lat.toFixed(4)},${lng.toFixed(4)}`;
    }

    function addFlagToMap(flag) {
        const lat = parseFloat(flag.x);
        const lng = parseFloat(flag.y);
        const key = getGroupKey(lat, lng);

        if (!flagGroups[key]) {
            flagGroups[key] = [];
        }
        
        // Prevent duplicate loads
        if (!flagGroups[key].find(f => f.id === flag.id)) {
            flagGroups[key].push(flag);
        }

        if (!markers[key]) {
            const marker = L.marker([lat, lng], { icon: customIcon }).addTo(map);
            markers[key] = marker;
            
            // Bring to front on hover
            marker.on('mouseover', function() {
                this.setZIndexOffset(1000);
                const tooltip = this.getTooltip();
                if (tooltip && tooltip.getElement()) {
                    tooltip.getElement().classList.add('active-tooltip');
                }
            });
            marker.on('mouseout', function() {
                if (isReplaying && activeReplayKey === key) {
                    return;
                }
                this.setZIndexOffset(0);
                const tooltip = this.getTooltip();
                if (tooltip && tooltip.getElement()) {
                    tooltip.getElement().classList.remove('active-tooltip');
                }
            });

            // Open Info Modal on click
            marker.on('click', function() {
                openInfoModal(key);
            });

            // Initial tooltip bind
            updateMarkerPopup(key);
            
            // Open popup if this is a newly added flag (not from initial load)
            // But only if it's the first flag at this location or we want to notify
        } else {
            updateMarkerPopup(key);
        }
    }

    function updateMarkerPopup(key) {
        const marker = markers[key];
        const flags = flagGroups[key];
        if (!marker || !flags || flags.length === 0) return;

        let tooltipHtml = `<div class="tooltip-container">`;
        
        const latestFlag = flags[flags.length - 1];
        tooltipHtml += generateFlagTooltipHtml(latestFlag);
        
        if (flags.length > 1) {
            tooltipHtml += `<div style="font-size: 0.7rem; color: #94a3b8; text-align: center; margin-top: 5px; border-top: 1px dashed #e2e8f0; padding-top: 5px;">+ ${flags.length - 1} more notes (Click for Full View)</div>`;
        }
        tooltipHtml += `</div>`;

        // Perfect alignment with symmetric icon [15, 42]
        if (marker._tooltip) {
            marker.unbindTooltip();
            delete marker._tooltip;
        }
        marker.bindTooltip(tooltipHtml, { 
            permanent: true, 
            direction: 'top', 
            offset: [0, -35], // Adjusted for the new custom icon height
            className: 'custom-tooltip'
        }).openTooltip();
    }

    function getMediaHtml(flagData, isTooltip = false) {
        let html = '';
        const imageExts = ['png', 'jpg', 'jpeg', 'gif', 'webp'];
        const videoExts = ['mp4', 'webm', 'mov'];

        if (flagData.file_path) {
            const ext = flagData.file_path.split('.').pop().toLowerCase();
            const mediaClass = isTooltip ? 'tooltip-media' : 'carousel-media';
            html += `<div class="${mediaClass}">`;
            if (imageExts.includes(ext)) {
                html += isTooltip ? `<img src="/${flagData.file_path}">` : `<a href="/${flagData.file_path}" target="_blank"><img src="/${flagData.file_path}"></a>`;
            } else if (videoExts.includes(ext)) {
                html += `<video src="/${flagData.file_path}" ${isTooltip ? 'autoplay muted loop playsinline' : 'controls'}></video>`;
            } else if (!isTooltip) {
                html += `<a href="/${flagData.file_path}" target="_blank" class="btn btn-secondary btn-sm" style="display:inline-block; margin-top:10px;">📄 View File</a>`;
            }
            html += `</div>`;
        }

        let ytId = null;
        if (flagData.text_content) {
            const words = flagData.text_content.split(/\s+/);
            for (let word of words) {
                const id = getYouTubeId(word);
                if (id) { ytId = id; break; }
            }
        }

        if (ytId) {
            html += `
            <div style="margin-top: 10px; position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0;">
                <iframe src="https://www.youtube.com/embed/${ytId}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" allowfullscreen></iframe>
            </div>`;
        }
        return html;
    }

    function generateFlagTooltipHtml(flagData) {
        let safeAuthorName = escapeHTML(flagData.author_name);
        let html = `<div class="tooltip-container"><strong class="tooltip-author-name">${safeAuthorName}</strong>`;
        if (flagData.text_content) {
            let text = escapeHTML(flagData.text_content);
            if (text.length > 200) text = text.substring(0, 200) + '...';
            html += `<span class="tooltip-content-preview">${text}</span>`;
        }
        html += getMediaHtml(flagData, true);
        html += `</div>`;
        return html;
    }

    // Modals
    function openModal(lat, lng) {
        document.getElementById('modalTitle').innerText = 'Add Note';
        document.getElementById('editFlagId').value = '';
        document.getElementById('coordLat').value = lat;
        document.getElementById('coordLng').value = lng;
        document.getElementById('displayCoords').innerText = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        if (!isAdmin) document.getElementById('nickname').disabled = false;
        document.getElementById('flagModal').style.display = 'flex';
    }

    function openEditModal(flagId) {
        let flagToEdit = null;
        for (const key in flagGroups) {
            const found = flagGroups[key].find(f => f.id === flagId);
            if (found) { flagToEdit = found; break; }
        }
        if (!flagToEdit) return;

        closeInfoModal();

        document.getElementById('modalTitle').innerText = 'Edit Note';
        document.getElementById('editFlagId').value = flagToEdit.id;
        document.getElementById('coordLat').value = flagToEdit.x;
        document.getElementById('coordLng').value = flagToEdit.y;
        document.getElementById('displayCoords').innerText = `${parseFloat(flagToEdit.x).toFixed(4)}, ${parseFloat(flagToEdit.y).toFixed(4)}`;
        document.getElementById('textContent').value = flagToEdit.text_content || '';
        document.getElementById('nickname').value = flagToEdit.author_name;
        
        if (!isAdmin) document.getElementById('nickname').disabled = true;

        updatePreview();
        document.getElementById('flagModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('flagModal').style.display = 'none';
        document.getElementById('flagForm').reset();
        document.getElementById('editFlagId').value = '';
        document.getElementById('mediaPreviewContainer').style.display = 'none';
        document.getElementById('mediaPreviewContent').innerHTML = '';
        if (!isAdmin) document.getElementById('nickname').disabled = false;
    }

    function openInfoModal(groupKey) {
        currentCarouselFlags = flagGroups[groupKey];
        currentCarouselIndex = 0;
        
        renderCarousel();
        document.getElementById('infoModal').style.display = 'flex';
    }

    function closeInfoModal() {
        document.getElementById('infoModal').style.display = 'none';
    }
    
    function deleteFlag(flagId) {
        if (confirm("Are you sure you want to delete this note?")) {
            socket.emit('delete_flag', { session_id: sessionId, flag_id: flagId });
        }
    }

    // Carousel logic
    function renderCarousel() {
        const container = document.getElementById('carouselContainer');
        container.innerHTML = '';
        
        if (currentCarouselFlags.length === 0) return;

        currentCarouselFlags.forEach((flagData, index) => {
            const div = document.createElement('div');
            div.className = `flag-carousel-item ${index === currentCarouselIndex ? 'active' : ''}`;
            
            let timeStr = flagData.created_at ? new Date(flagData.created_at).toLocaleString() : 'Just now';
            
            // Authorization for Edit/Delete
            const isOwner = flagData.client_id === clientId;
            const canEdit = isAdmin || isOwner;
            
            let safeAuthorName = escapeHTML(flagData.author_name);
            let html = `<div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 15px;">
                <h4 style="margin: 0;">${safeAuthorName} <br><small class="text-muted" style="font-size:0.7em;">${timeStr}</small></h4>`;
                
            if (canEdit) {
                html += `
                <div style="display: flex; gap: 5px;">
                    <button type="button" class="btn btn-secondary btn-sm" onclick="openEditModal(${flagData.id})" style="padding: 4px 8px; font-size: 0.8em; margin: 0;">Edit</button>
                    <button type="button" class="btn btn-danger btn-sm" onclick="deleteFlag(${flagData.id})" style="padding: 4px 8px; font-size: 0.8em; margin: 0;">Delete</button>
                </div>`;
            }
            html += `</div>`;
            
            // Extract YT links
            let parsedText = flagData.text_content || '';
            let ytIdForView = null;
            if (parsedText) {
                const words = parsedText.split(/\s+/);
                for (let word of words) {
                    if (!ytIdForView) ytIdForView = getYouTubeId(word);
                }
            }

            let safeParsedText = escapeHTML(parsedText);
            html += `<p style="white-space: pre-wrap; font-size: 0.95em;">${safeParsedText}</p>`;
            
            // Use consolidated media helper
            html += getMediaHtml(flagData, false);
            
            div.innerHTML = html;
            container.appendChild(div);
        });

        const controls = document.getElementById('carouselControls');
        if (currentCarouselFlags.length > 1) {
            controls.style.display = 'flex';
            document.getElementById('carouselIndicator').innerText = `${currentCarouselIndex + 1} / ${currentCarouselFlags.length}`;
        } else {
            controls.style.display = 'none';
        }
    }

    function prevFlag() {
        if (currentCarouselIndex > 0) {
            currentCarouselIndex--;
            renderCarousel();
        }
    }

    function nextFlag() {
        if (currentCarouselIndex < currentCarouselFlags.length - 1) {
            currentCarouselIndex++;
            renderCarousel();
        }
    }

    // Submit (Add or Edit)
    document.getElementById('flagForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitFlagBtn');
        btn.disabled = true;
        btn.innerText = 'Saving...';

        const lat = document.getElementById('coordLat').value;
        const lng = document.getElementById('coordLng').value;
        const textContent = document.getElementById('textContent').value;
        const fileInput = document.getElementById('fileInput');
        let authorName = document.getElementById('nickname').value || 'Participant';
        const editId = document.getElementById('editFlagId').value;

        let file_path = null;
        let thumbnail_path = null;
        let fileUploaded = false;

        if (fileInput.files.length > 0) {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    file_path = data.file_path;
                    thumbnail_path = data.thumbnail_path;
                    fileUploaded = true;
                }
            } catch (err) {
                console.error(err);
                alert("File upload failed.");
                btn.disabled = false;
                btn.innerText = 'Save';
                return;
            }
        }

        const payload = {
            session_id: sessionId,
            region_id: 'pin',
            x: lat,
            y: lng,
            text_content: textContent,
            author_name: authorName,
            client_id: clientId
        };

        // Only include file paths if a new file was uploaded, so we don't accidentally overwrite existing on edit
        if (fileUploaded) {
            payload.file_path = file_path;
            payload.thumbnail_path = thumbnail_path;
        }

        if (editId) {
            payload.flag_id = editId;
            socket.emit('edit_flag', payload);
        } else {
            socket.emit('add_flag', payload);
        }

        closeModal();
        btn.disabled = false;
        btn.innerText = 'Save';
    });

    // Replay Functions
    function startReplay() {
        if (!isAdmin) return;
        if (allFlags.length === 0) {
            alert("재생할 학습자 메모가 없습니다.");
            return;
        }
        
        // Initialize autoplay session storage
        sessionStorage.setItem('autoplay_active', 'true');
        if (!sessionStorage.getItem('autoplay_visited')) {
            sessionStorage.setItem('autoplay_visited', JSON.stringify([sessionId]));
        }
        
        closeModal();
        closeInfoModal();
        
        isReplaying = true;
        replayIndex = 0;
        
        const replayPanel = document.getElementById('replayPanel');
        if (replayPanel) replayPanel.style.display = 'flex';
        
        const slider = document.getElementById('replaySlider');
        if (slider) {
            slider.max = allFlags.length - 1;
            slider.value = 0;
        }
        
        const startReplayBtn = document.getElementById('startReplayBtn');
        if (startReplayBtn) {
            startReplayBtn.style.opacity = '0.5';
            startReplayBtn.disabled = true;
        }
        
        showReplayStep();
        playReplay();
    }
    
    function stopReplay() {
        if (!isAdmin) return;
        pauseReplay();
        isReplaying = false;
        
        // Clear autoplay session storage
        sessionStorage.removeItem('autoplay_active');
        sessionStorage.removeItem('autoplay_visited');
        sessionStorage.removeItem('autoplay_speed');
        
        const replayPanel = document.getElementById('replayPanel');
        if (replayPanel) replayPanel.style.display = 'none';
        
        const startReplayBtn = document.getElementById('startReplayBtn');
        if (startReplayBtn) {
            startReplayBtn.style.opacity = '1';
            startReplayBtn.disabled = false;
        }
        
        restoreAllMarkers();
    }
    
    function restoreAllMarkers() {
        if (activeReplayKey && markers[activeReplayKey]) {
            const marker = markers[activeReplayKey];
            marker.setZIndexOffset(0);
            const el = marker.getElement();
            if (el) {
                const pin = el.querySelector('.marker-pin');
                if (pin) pin.classList.remove('replay-active');
            }
            updateMarkerPopup(activeReplayKey);
        }
        activeReplayKey = null;
    }
    
    function showReplayStep() {
        if (!isAdmin) return;
        if (allFlags.length === 0 || replayIndex < 0 || replayIndex >= allFlags.length) return;
        
        restoreAllMarkers();
        
        const currentFlag = allFlags[replayIndex];
        const lat = parseFloat(currentFlag.x);
        const lng = parseFloat(currentFlag.y);
        const key = getGroupKey(lat, lng);
        
        // Offset center up so marker is at the bottom of the map view
        const targetZoom = 15;
        const targetPoint = map.project([lat, lng], targetZoom);
        const centerPoint = L.point(targetPoint.x, targetPoint.y - 240);
        const centerLatLng = map.unproject(centerPoint, targetZoom);
        
        map.setView(centerLatLng, targetZoom, { animate: true, duration: 1.0 });
        
        const marker = markers[key];
        if (marker) {
            activeReplayKey = key;
            marker.setZIndexOffset(1000); // Bring active marker to the front
            
            setTimeout(() => {
                const el = marker.getElement();
                if (el) {
                    const pin = el.querySelector('.marker-pin');
                    if (pin) pin.classList.add('replay-active');
                }
            }, 100);
            
            let tooltipHtml = `<div class="tooltip-container">`;
            tooltipHtml += generateFlagTooltipHtml(currentFlag);
            tooltipHtml += `</div>`;
            
            marker.unbindTooltip();
            marker.bindTooltip(tooltipHtml, {
                permanent: true,
                direction: 'top',
                offset: [0, -35],
                className: 'custom-tooltip active-tooltip'
            }).openTooltip();
        }
        
        const timeStr = currentFlag.created_at ? new Date(currentFlag.created_at).toLocaleString() : 'Just now';
        document.getElementById('replayTimeText').innerText = timeStr;
        
        document.getElementById('replaySlider').value = replayIndex;
        document.getElementById('replayProgressText').innerText = `${replayIndex + 1} / ${allFlags.length}`;
    }
    
    function updateReplayProgress() {
        const slider = document.getElementById('replaySlider');
        slider.max = allFlags.length - 1;
        document.getElementById('replayProgressText').innerText = `${replayIndex + 1} / ${allFlags.length}`;
    }
    
    function toggleReplayPlay() {
        if (isPlaying) {
            pauseReplay();
        } else {
            playReplay();
        }
    }
    
    function playReplay() {
        isPlaying = true;
        const btn = document.getElementById('replayPlayPauseBtn');
        if (btn) {
            btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
            btn.title = '일시정지';
        }
        scheduleNextStep();
    }
    
    function pauseReplay() {
        isPlaying = false;
        const btn = document.getElementById('replayPlayPauseBtn');
        if (btn) {
            btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
            btn.title = '재생';
        }
        if (replayTimer) {
            clearTimeout(replayTimer);
            replayTimer = null;
        }
    }
    
    function scheduleNextStep() {
        if (replayTimer) clearTimeout(replayTimer);
        
        const speed = parseInt(document.getElementById('replaySpeed').value) || 3000;
        replayTimer = setTimeout(() => {
            if (!isPlaying) return;
            
            if (replayIndex < allFlags.length - 1) {
                replayIndex++;
                showReplayStep();
                scheduleNextStep();
            } else {
                // Move to next session if multiple sessions exist
                const currentIdx = classSessions.findIndex(s => s.id === sessionId);
                if (currentIdx !== -1 && classSessions.length > 1) {
                    const nextSession = classSessions[(currentIdx + 1) % classSessions.length];
                    sessionStorage.setItem('autoplay_active', 'true');
                    sessionStorage.setItem('autoplay_speed', speed.toString());
                    
                    let visited = JSON.parse(sessionStorage.getItem('autoplay_visited') || '[]');
                    if (visited.includes(nextSession.id)) {
                        visited = [nextSession.id];
                    } else {
                        visited.push(nextSession.id);
                    }
                    sessionStorage.setItem('autoplay_visited', JSON.stringify(visited));
                    
                    window.location.href = `/session/${nextSession.id}`;
                } else {
                    replayIndex = 0;
                    showReplayStep();
                    scheduleNextStep();
                }
            }
        }, speed);
    }
    
    function nextReplay() {
        pauseReplay();
        if (replayIndex < allFlags.length - 1) {
            replayIndex++;
        } else {
            replayIndex = 0;
        }
        showReplayStep();
    }
    
    function prevReplay() {
        pauseReplay();
        if (replayIndex > 0) {
            replayIndex--;
        } else {
            replayIndex = allFlags.length - 1;
        }
        showReplayStep();
    }
    
    function seekReplay(val) {
        pauseReplay();
        replayIndex = parseInt(val);
        showReplayStep();
    }
    
    function changeReplaySpeed(val) {
        if (isPlaying) {
            scheduleNextStep();
        }
    }
</script>
{% endblock %}
